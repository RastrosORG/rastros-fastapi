databases:
  - name: dbrastros
    plan: free

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: rastros4-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dbrastros
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: ALLOWED_ORIGINS
        value: https://rastros4-web.onrender.com,https://rastros.org,https://www.rastros.org
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: us-east-2
      - key: CHAVE_CADASTRO_AVALIADOR
        sync: false

  # ── Frontend (React/Vite) ────────────────────────────────────────────
  - type: web
    name: rastros4-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://rastros4-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
